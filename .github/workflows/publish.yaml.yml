name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish-jar:
    name: Publish Provider JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish JAR to GitHub Packages
        run: ./mvnw -B -ntp -DskipTests deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-image:
    name: Publish Keycloak Image
    runs-on: ubuntu-latest
    needs: publish-jar
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build provider JAR
        run: ./mvnw -B -ntp -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          # Tag format: v0.1.0 or 0.1.0 — strip optional leading 'v'
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image_tag=26.6.1-zylos-act-${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push Keycloak image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/zylos-platform/keycloak:${{ steps.version.outputs.image_tag }}
            ghcr.io/zylos-platform/keycloak:latest-zylos-act
          build-args: |
            ZYLOS_EXTENSIONS_VERSION=${{ steps.version.outputs.version }}
          provenance: true
          sbom: true

      - name: Image digest
        run: echo "Image published with digest verified for ghcr.io/zylos-platform/keycloak:${{ steps.version.outputs.image_tag }}"
